<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sarkari Networker - Newspaper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;}

/* HEADER */
.header{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
padding:10px 5%;
background:linear-gradient(90deg,#007bff,#00c6ff);
color:#fff;
gap:10px;
position:sticky;
top:0;
z-index:1000;
}

.logo{font-size:18px;font-weight:bold;}

/* SEARCH */
.search-box{
position:relative;
width:100%;
max-width:350px;
}

.search-box input{
width:100%;
padding:10px 15px 10px 40px;
border:none;
border-radius:25px;
outline:none;
}

.search-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#555;
}

/* NAV */
.nav-links{
display:flex;
gap:10px;
}

.nav-links a{
color:#fff;
text-decoration:none;
font-size:14px;
}

.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
}

/* GRID */
.container{
width:95%;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
}

@media(max-width:992px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
font-size:16px;
margin-bottom:10px;
}

/* BUTTON */
.btn{
display:inline-block;
padding:10px;
background:#007bff;
color:#fff;
text-decoration:none;
border-radius:6px;
}

/* LOAD */
.load-more{
text-align:center;
margin:25px;
}

/* MOBILE */
@media(max-width:768px){

.menu-toggle{display:block;}

.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:70px;
right:10px;
background:#fff;
width:220px;
border-radius:10px;
padding:10px;
}

.nav-links a{
color:#000;
padding:10px;
border-bottom:1px solid #eee;
}

.nav-links.active{
display:flex;
}

.search-box{
max-width:100%;
}

}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="logo">🔥 Sarkari Networker</div>

<div class="search-box">
<span class="search-icon">🔍</span>
<input type="text" id="searchInput" placeholder="Search news..." oninput="liveSearch()">
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="menu">
<a href="index.html">होम</a>
<a href="result.html">रिजल्ट</a>
<a href="index-active-upcomming-job/active-upcoming.html">नौकरी</a>
<a href="newspaper.html">न्यूज़</a>
</div>

</div>

<!-- CONTENT -->
<div class="container">

<div class="grid" id="newsContainer"></div>

<div class="load-more">
<button id="loadBtn" class="btn" onclick="loadMore()">Load More</button>
</div>

</div>
<script src="newspaper-json-java/script.js"></script>

</body>
</html>
