<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator - Sarkari Networker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 340px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 14px;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
}

.result span {
  font-weight: bold;
  color: #ee0979;
}
</style>
</head>

<body>

<div class="container">
  <h2>💰 EMI Calculator</h2>

  <label>Loan Amount (₹)</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <label>Interest Rate (% per year)</label>
  <input type="number" id="rate" placeholder="Enter interest rate">

  <label>Loan Tenure (Years)</label>
  <input type="number" id="years" placeholder="Enter years">

  <button onclick="calculateEMI()">Calculate EMI</button>

  <div class="result" id="result"></div>
</div>

<script>
function calculateEMI() {
  let P = document.getElementById("amount").value;
  let annualRate = document.getElementById("rate").value;
  let years = document.getElementById("years").value;

  if (!P || !annualRate || !years) {
    document.getElementById("result").innerHTML = "⚠️ Fill all fields";
    return;
  }

  let r = annualRate / 12 / 100;
  let n = years * 12;

  let EMI = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

  EMI = EMI.toFixed(2);

  document.getElementById("result").innerHTML =
    `Monthly EMI: <span>₹ ${EMI}</span>`;
}
</script>

</body>
</html>
