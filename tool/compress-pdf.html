<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compress Image & PDF - Sarkari Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#36d1dc,#5b86e5);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  padding:25px;
  border-radius:15px;
  width:380px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  animation:fadeIn 1s ease;
}

h2{ margin-bottom:10px; }

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0077ff;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#0056cc;
}

#preview img{
  width:100px;
  margin-top:10px;
  border-radius:8px;
}

.status{
  margin-top:10px;
  font-size:14px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<div class="container">
  <h2>Compress Tool</h2>

  <input type="file" id="fileInput" accept="image/*,application/pdf">

  <select id="quality">
    <option value="0.9">High Quality</option>
    <option value="0.6">Medium Quality</option>
    <option value="0.3">Low Quality</option>
  </select>

  <div id="preview"></div>

  <button onclick="compressFile()">Compress</button>

  <div class="status" id="status"></div>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let selectedFile;

document.getElementById("fileInput").addEventListener("change", function(e){
  selectedFile = e.target.files[0];

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  if(selectedFile.type.startsWith("image")){
    const img = document.createElement("img");
    img.src = URL.createObjectURL(selectedFile);
    preview.appendChild(img);
  } else {
    preview.innerText = "PDF Selected 📄";
  }
});

async function compressFile(){
  const status = document.getElementById("status");
  const quality = parseFloat(document.getElementById("quality").value);

  if(!selectedFile){
    status.innerText = "Upload file first!";
    return;
  }

  status.innerText = "Compressing...";

  // IMAGE COMPRESS
  if(selectedFile.type.startsWith("image")){
    const img = new Image();
    img.src = URL.createObjectURL(selectedFile);

    img.onload = function(){
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img,0,0);

      canvas.toBlob(function(blob){
        downloadFile(blob, "compressed.jpg");
        status.innerText = "Image Compressed 🚀";
      }, "image/jpeg", quality);
    };
  }

  // PDF COMPRESS (basic)
  else if(selectedFile.type === "application/pdf"){
    const bytes = await selectedFile.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(bytes);

    const compressedBytes = await pdfDoc.save({
      useObjectStreams: true
    });

    const blob = new Blob([compressedBytes], {type:"application/pdf"});
    downloadFile(blob, "compressed.pdf");

    status.innerText = "PDF Compressed (basic)";
  }
}

function downloadFile(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  a.click();
}
</script>

</body>
</html>
