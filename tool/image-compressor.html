<body>

<div class="container">
<h2>🔥 Premium Bulk Image Compressor</h2>
<p>⭐ by Sarkari Networker</p>

<div class="drop-area" id="dropArea">
Click / Drag Images
<input type="file" id="fileInput" multiple hidden accept="image/*">
</div>

<div id="preview"></div>

<h3>Select Target Size</h3>

<input type="number" id="targetSize" placeholder="Enter KB manually">

<div>
  <button onclick="setSize(50)">50 KB</button>
  <button onclick="setSize(100)">100 KB</button>
  <button onclick="setSize(200)">200 KB</button>
  <button onclick="setSize(500)">500 KB</button>
  <button onclick="setSize(1024)">1 MB</button>
</div>

<br>

<button onclick="compressAll()">🚀 Compress All</button>

<p id="status"></p>

</div>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

let files = [];
let compressedFiles = [];

// Upload
dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => handleFiles(e.target.files);

dropArea.ondragover = e => e.preventDefault();

dropArea.ondrop = e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

function handleFiles(selectedFiles) {
  files = [...selectedFiles];
  preview.innerHTML = "";

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement("div");
      div.className = "image-box";
      div.innerHTML = `<img src="${e.target.result}">`;
      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

// Quick buttons
function setSize(size) {
  document.getElementById("targetSize").value = size;
}

// Compress All
function compressAll() {
  const targetKB = document.getElementById("targetSize").value;
  if (!targetKB) return alert("Enter KB!");

  compressedFiles = [];
  let done = 0;

  files.forEach((file, index) => {
    compressImage(file, targetKB, index, () => {
      done++;
      document.getElementById("status").innerText =
        `Processed ${done}/${files.length}`;

      if (done === files.length) {
        document.getElementById("status").innerText = "All images compressed ✅";
      }
    });
  });
}

// Compress Logic
function compressImage(file, targetKB, index, callback) {
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    let quality = 0.9;
    const targetBytes = targetKB * 1024;

    function loop() {
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(blob => {
        if (blob.size <= targetBytes || quality < 0.1) {
          compressedFiles[index] = blob;

          const btn = document.createElement("button");
          btn.innerText = "Download";
          btn.onclick = () => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "compressed_" + index + ".jpg";
            a.click();
          };

          preview.children[index].appendChild(btn);

          callback();
        } else {
          quality -= 0.05;
          loop();
        }
      }, "image/jpeg", quality);
    }

    loop();
  };
}
</script>
