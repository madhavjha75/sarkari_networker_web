<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split PDF Tool - Sarkari Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fadeIn 1s ease;
}

h2{
  margin-bottom:15px;
}

input[type="file"], input[type="text"]{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#4facfe;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#007bff;
}

.status{
  margin-top:10px;
  font-size:14px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<div class="container">
  <h2>Split PDF</h2>

  <input type="file" id="pdfFile" accept="application/pdf">

  <input type="text" id="range" placeholder="Enter pages (e.g. 1-3,5,7-9)">

  <button onclick="splitPDF()">Split PDF</button>

  <div class="status" id="status"></div>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function splitPDF(){
  const fileInput = document.getElementById("pdfFile");
  const rangeInput = document.getElementById("range").value;
  const status = document.getElementById("status");

  if(!fileInput.files.length){
    status.innerText = "Please upload a PDF!";
    return;
  }

  status.innerText = "Processing...";

  const file = fileInput.files[0];
  const arrayBuffer = await file.arrayBuffer();

  const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
  const newPdf = await PDFLib.PDFDocument.create();

  const pages = parseRange(rangeInput);

  for(let p of pages){
    const [copiedPage] = await newPdf.copyPages(pdfDoc, [p-1]);
    newPdf.addPage(copiedPage);
  }

  const pdfBytes = await newPdf.save();

  const blob = new Blob([pdfBytes], {type: 'application/pdf'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "split.pdf";
  a.click();

  status.innerText = "Done! Download started 🚀";
}

function parseRange(range){
  let pages = [];
  let parts = range.split(",");

  parts.forEach(part=>{
    if(part.includes("-")){
      let [start,end] = part.split("-").map(Number);
      for(let i=start;i<=end;i++){
        pages.push(i);
      }
    } else {
      pages.push(Number(part));
    }
  });

  return pages;
}
</script>

</body>
</html>
